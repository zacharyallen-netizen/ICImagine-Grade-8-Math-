<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introduction to Slope-Intercept Form</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    background: #f5f3ed;
    color: #3a3631;
    padding: 20px 16px 60px;
    min-height: 100vh;
  }
  .container { max-width: 760px; margin: 0 auto; }
  
  /* Header */
  .header { text-align: center; margin-bottom: 12px; }
  .header h1 { font-size: 24px; font-weight: 700; color: #1e2d4f; letter-spacing: -0.5px; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #8a8578; }

  /* Progress bar */
  .progress-bar-wrap {
    background: #e8e5dd; border-radius: 20px; height: 22px; margin: 10px 0 18px;
    position: relative; overflow: hidden; border: 1px solid #ddd8ce;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, #1e2d4f, #2e4a7a);
    border-radius: 20px; transition: width 0.5s ease; min-width: 0;
  }
  .progress-bar-text {
    position: absolute; top: 0; left: 0; right: 0; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #1e2d4f;
    font-family: 'DM Mono', monospace;
  }

  /* Card */
  .card {
    background: #fff; border: 1px solid #ddd8ce; border-radius: 10px;
    padding: 16px 18px; margin-bottom: 16px;
    transition: box-shadow 0.3s;
  }
  .card.completed { border-color: #8aab7a; box-shadow: 0 0 0 2px #8aab7a33; }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
  }
  .eq-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%; background: #1e2d4f;
    color: #ffc107; font-size: 13px; font-weight: 700;
    font-family: 'DM Mono', monospace;
  }
  .eq-badge.done { background: #4a7a42; }
  .eq-label {
    font-size: 17px; font-weight: 700; color: #1e2d4f;
    font-family: 'DM Mono', monospace; margin-left: 8px;
  }
  .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .btn {
    padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-check { background: #1e2d4f; color: #ffc107; }
  .btn-check:hover { background: #2e4a7a; }
  .btn-hint { background: #ffc107; color: #1e2d4f; }
  .btn-hint:hover { background: #e6ad00; }
  .btn-show { background: #c0785c; color: #fff; }
  .btn-show:hover { background: #a8654a; }
  .btn-reset { background: #f5f3ed; color: #555; border: 1px solid #ccc; }
  .btn-reset:hover { background: #e8e5dd; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* Feedback */
  .feedback {
    padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    margin-bottom: 8px;
  }
  .feedback.success { background: #e8f0e4; color: #3a6632; }
  .feedback.error { background: #f5e0db; color: #8b3a2a; }
  .feedback.warn { background: #fef6e0; color: #8a6b20; }
  .feedback.hint { background: #e8eef6; color: #1e2d4f; }

  /* Content area */
  .card-content {
    display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap;
  }

  /* Table */
  .eq-table { border-collapse: collapse; font-size: 13px; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .eq-table th {
    padding: 5px 10px; background: #1e2d4f; color: #ffc107;
    border: 1px solid #1e2d4f; font-size: 11px; font-weight: 700; text-align: center;
  }
  .eq-table td {
    padding: 4px 6px; border: 1px solid #ddd8ce; text-align: center;
  }
  .eq-table td.x-cell {
    background: #f0ede6; font-weight: 600; color: #3a3631; width: 50px;
  }
  .eq-table td.y-cell { width: 56px; position: relative; }
  .eq-table td.correct { background: #e8f0e4; border-color: #8aab7a; }
  .eq-table td.wrong { background: #f5e0db; border-color: #c07060; }
  .eq-table td.revealed { background: #e8eef6; }
  .y-input {
    width: 44px; border: none; background: transparent; text-align: center;
    font-size: 13px; font-family: 'DM Mono', monospace; outline: none; color: #1e2d4f;
  }
  .y-input:disabled { color: #1e2d4f; }
  .revealed-val { font-weight: 600; color: #2e4a7a; }

  /* Grid area */
  .grid-wrap { flex: 1; min-width: 220; max-width: 320; }
  .grid-wrap svg { width: 100%; cursor: crosshair; border-radius: 4px; }
  .grid-help { font-size: 10px; color: #8a8578; text-align: center; margin-top: 3px; }
  .point-feedback {
    font-size: 11px; text-align: center; margin-top: 4px; font-weight: 600;
    min-height: 16px;
  }
  .point-feedback.match { color: #3a6632; }
  .point-feedback.miss { color: #8b3a2a; }

  /* Step prompt */
  .step-prompt {
    background: #f9f7f1; border: 1px dashed #d0cdc4; border-radius: 8px;
    padding: 8px 12px; font-size: 12px; color: #555; margin-top: 6px;
    font-family: 'DM Mono', monospace; line-height: 1.5;
  }
  .step-prompt strong { color: #1e2d4f; }

  /* Attempts */
  .attempts { font-size: 10px; color: #8a8578; margin-top: 2px; }

  /* Reflection */
  .reflection h3 { font-size: 14px; color: #1e2d4f; font-weight: 700; margin-bottom: 8px; }
  .reflection-q { margin-bottom: 8px; }
  .reflection-q label { font-size: 12px; color: #3a3631; font-weight: 600; display: block; margin-bottom: 3px; }
  .reflection-q textarea {
    width: 100%; border: 1px solid #ddd8ce; border-radius: 6px;
    padding: 6px 8px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    resize: vertical; background: #faf8f2; outline: none;
  }
  .reflection-q textarea:focus { border-color: #1e2d4f; }

  /* Celebration */
  .celebration {
    text-align: center; padding: 16px; background: #1e2d4f; color: #ffc107;
    border-radius: 10px; margin-bottom: 16px; font-size: 18px; font-weight: 700;
    display: none;
  }
  .celebration.show { display: block; animation: pop 0.4s ease; }
  @keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @media (max-width: 520px) {
    .card-content { flex-direction: column; }
    .grid-wrap { max-width: 100%; }
    .header h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<a href="unit6.html" class="back-to-unit6">← Back to Unit 6</a>
<style>
.back-to-unit6{position:fixed;top:12px;left:12px;z-index:9999;display:inline-block;padding:8px 14px;background:linear-gradient(135deg,#1E2D4F,#0d1f3f);color:#FFC107;font-family:'Arvo',Georgia,serif;font-weight:bold;font-size:13px;border-radius:8px;border:2px solid #FFC107;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:all .2s}
.back-to-unit6:hover{background:#FFC107;color:#1E2D4F;transform:translateY(-1px)}
</style>

<div class="container">
  <div class="header">
    <h1>Introduction to Slope-Intercept Form</h1>
    <p>Complete each table, plot points on the graph, then check your work!</p>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    <div class="progress-bar-text" id="progressText">0 of 6 Complete</div>
  </div>

  <div class="celebration" id="celebration">🎉 Outstanding Work! All 6 equations complete! 🎉</div>

  <div id="cards"></div>

  <div class="card reflection">
    <h3>Reflection Questions</h3>
    <div class="reflection-q">
      <label>A. Compare #1 and #2. What effect does the negative sign have on the graph?</label>
      <textarea rows="2" placeholder="Type your answer..."></textarea>
    </div>
    <div class="reflection-q">
      <label>B. Compare #1, #3, and #4. What effect does adding or subtracting a number have?</label>
      <textarea rows="2" placeholder="Type your answer..."></textarea>
    </div>
    <div class="reflection-q">
      <label>C. Compare #1 and #5. What effect does changing the number in front of x have?</label>
      <textarea rows="2" placeholder="Type your answer..."></textarea>
    </div>
  </div>
</div>

<script>
const EQUATIONS = [
  { id:1, label:"y = x", desc:"x", fn:x=>x, xVals:[-3,-2,-1,0,1,2,3] },
  { id:2, label:"y = −x", desc:"−x", fn:x=>-x, xVals:[-3,-2,-1,0,1,2,3] },
  { id:3, label:"y = x + 3", desc:"x + 3", fn:x=>x+3, xVals:[-3,-2,-1,0,1,2,3] },
  { id:4, label:"y = x − 3", desc:"x − 3", fn:x=>x-3, xVals:[-3,-2,-1,0,1,2,3] },
  { id:5, label:"y = ½x", desc:"½ · x", fn:x=>x/2, xVals:[-4,-2,0,2,4,6,8] },
  { id:6, label:"y = ½x + 4", desc:"½ · x + 4", fn:x=>x/2+4, xVals:[-4,-2,0,2,4,6,8] },
];

const RANGE = 10;
const GPX = 280;
const STEP = GPX / (RANGE * 2);
const toP = v => GPX/2 + v*STEP;
const fromP = p => Math.round((p - GPX/2)/STEP);

const state = EQUATIONS.map(eq => ({
  yVals: eq.xVals.map(()=>""),
  points: [],
  attempts: 0,
  revealed: new Set(),
  complete: false,
  showLine: false,
  feedback: null,
  stepPrompt: null,
  pointFeedback: null,
}));

function updateProgress() {
  const done = state.filter(s=>s.complete).length;
  document.getElementById('progressFill').style.width = (done/6*100)+'%';
  document.getElementById('progressText').textContent = `${done} of 6 Complete`;
  const cel = document.getElementById('celebration');
  if (done === 6) cel.classList.add('show'); else cel.classList.remove('show');
}

function buildSVG(idx) {
  const eq = EQUATIONS[idx];
  const s = state[idx];
  let svg = `<svg viewBox="0 0 ${GPX} ${GPX}" xmlns="http://www.w3.org/2000/svg" style="background:#faf8f2">`;
  
  // Grid lines
  for (let i = -RANGE; i <= RANGE; i++) {
    const p = toP(i);
    if (i !== 0) {
      svg += `<line x1="${p}" y1="0" x2="${p}" y2="${GPX}" stroke="#e0ddd5" stroke-width="0.5"/>`;
      svg += `<line x1="0" y1="${p}" x2="${GPX}" y2="${p}" stroke="#e0ddd5" stroke-width="0.5"/>`;
    }
  }
  
  // Axes
  svg += `<line x1="0" y1="${toP(0)}" x2="${GPX}" y2="${toP(0)}" stroke="#3a3631" stroke-width="1.2"/>`;
  svg += `<line x1="${toP(0)}" y1="0" x2="${toP(0)}" y2="${GPX}" stroke="#3a3631" stroke-width="1.2"/>`;
  svg += `<text x="${GPX-4}" y="${toP(0)-5}" font-size="9" font-weight="bold" fill="#3a3631" text-anchor="end">x</text>`;
  svg += `<text x="${toP(0)+6}" y="10" font-size="9" font-weight="bold" fill="#3a3631">y</text>`;
  
  // Labels every 5
  for (let i = -RANGE; i <= RANGE; i += 5) {
    if (i === 0) continue;
    svg += `<text x="${toP(i)}" y="${toP(0)+11}" text-anchor="middle" font-size="6" fill="#8a8578">${i}</text>`;
    svg += `<text x="${toP(0)-4}" y="${toP(-i)+3}" text-anchor="end" font-size="6" fill="#8a8578">${i}</text>`;
  }
  
  // Correct line (dashed)
  if (s.showLine) {
    let pts = [];
    for (let gx = -RANGE; gx <= RANGE; gx += 0.25) {
      const gy = eq.fn(gx);
      if (Math.abs(gy) <= RANGE) pts.push(`${toP(gx)},${toP(-gy)}`);
    }
    if (pts.length > 1) {
      svg += `<polyline points="${pts.join(' ')}" fill="none" stroke="#c0785c" stroke-width="1.8" stroke-dasharray="6 3" opacity="0.6"/>`;
    }
  }

  // Student line connecting plotted points in x order
  if (s.points.length >= 2) {
    const sorted = [...s.points].sort((a,b) => a.x - b.x);
    const linePts = sorted.map(p => `${toP(p.x)},${toP(-p.y)}`).join(' ');
    svg += `<polyline points="${linePts}" fill="none" stroke="#1e2d4f" stroke-width="1.5" opacity="0.5"/>`;
  }
  
  // Points
  s.points.forEach(p => {
    const correct = Math.abs(eq.fn(p.x) - p.y) < 0.01;
    const color = s.showLine ? (correct ? '#4a7a42' : '#c04040') : '#c0785c';
    svg += `<circle cx="${toP(p.x)}" cy="${toP(-p.y)}" r="5" fill="${color}" stroke="#faf8f2" stroke-width="1.5"/>`;
  });
  
  svg += '</svg>';
  return svg;
}

function getStepPrompt(eq, xVal) {
  const x = xVal;
  switch(eq.id) {
    case 1: return `Substitute <strong>x = ${x}</strong> into y = x → y = <strong>${x}</strong>`;
    case 2: return `Substitute <strong>x = ${x}</strong> into y = −x → y = −(${x}) = <strong>?</strong>`;
    case 3: return `Substitute <strong>x = ${x}</strong> into y = x + 3 → y = ${x} + 3 = <strong>?</strong>`;
    case 4: return `Substitute <strong>x = ${x}</strong> into y = x − 3 → y = ${x} − 3 = <strong>?</strong>`;
    case 5: return `Substitute <strong>x = ${x}</strong> into y = ½x → y = ½ · (${x}) = <strong>?</strong>`;
    case 6: return `Substitute <strong>x = ${x}</strong> into y = ½x + 4 → y = ½ · (${x}) + 4 = <strong>?</strong>`;
  }
}

function getHint(idx) {
  const eq = EQUATIONS[idx];
  const s = state[idx];
  // Find first empty or wrong y-value
  for (let i = 0; i < eq.xVals.length; i++) {
    if (s.revealed.has(i)) continue;
    const entered = s.yVals[i].trim();
    const correct = eq.fn(eq.xVals[i]);
    if (entered === "" || parseFloat(entered) !== correct) {
      s.stepPrompt = getStepPrompt(eq, eq.xVals[i]);
      s.feedback = { type: 'hint', msg: `💡 Hint for x = ${eq.xVals[i]}:` };
      render(idx);
      return;
    }
  }
  s.feedback = { type: 'success', msg: 'All values look good! No hints needed.' };
  s.stepPrompt = null;
  render(idx);
}

function showAnswer(idx) {
  const eq = EQUATIONS[idx];
  const s = state[idx];
  // Reveal first unrevealed wrong/empty value
  for (let i = 0; i < eq.xVals.length; i++) {
    if (s.revealed.has(i)) continue;
    const entered = s.yVals[i].trim();
    const correct = eq.fn(eq.xVals[i]);
    if (entered === "" || parseFloat(entered) !== correct) {
      s.revealed.add(i);
      s.yVals[i] = String(correct);
      s.feedback = { type: 'hint', msg: `Revealed: when x = ${eq.xVals[i]}, y = ${correct}` };
      s.stepPrompt = null;
      render(idx);
      return;
    }
  }
}

function checkAnswers(idx) {
  const eq = EQUATIONS[idx];
  const s = state[idx];
  s.attempts++;
  let allCorrect = true, allFilled = true;
  const results = eq.xVals.map((xv, i) => {
    if (s.revealed.has(i)) return 'correct';
    const entered = s.yVals[i].trim();
    if (entered === "") { allFilled = false; return 'empty'; }
    if (parseFloat(entered) === eq.fn(xv)) return 'correct';
    allCorrect = false;
    return 'wrong';
  });
  s.showLine = true;
  s.cellResults = results;
  s.stepPrompt = null;

  if (!allFilled) {
    s.feedback = { type:'warn', msg:'Fill in all y-values first!' };
  } else if (allCorrect) {
    s.feedback = { type:'success', msg:'✓ All correct! Great job!' };
    s.complete = true;
    updateProgress();
  } else {
    const wrongCount = results.filter(r=>r==='wrong').length;
    s.feedback = { type:'error', msg:`${wrongCount} value${wrongCount>1?'s':''} need${wrongCount===1?'s':''} fixing. Try again!` };
    if (s.attempts >= 3) {
      s.feedback.msg += ' Use "Show Answer" if you\'re stuck.';
    }
  }
  render(idx);
}

function resetEq(idx) {
  const eq = EQUATIONS[idx];
  state[idx] = {
    yVals: eq.xVals.map(()=>""),
    points: [],
    attempts: 0,
    revealed: new Set(),
    complete: false,
    showLine: false,
    feedback: null,
    stepPrompt: null,
    pointFeedback: null,
    cellResults: null,
  };
  updateProgress();
  render(idx);
}

function handleGridClick(idx, e) {
  const svg = e.currentTarget;
  const rect = svg.getBoundingClientRect();
  const scaleX = GPX / rect.width;
  const scaleY = GPX / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const gx = fromP(px);
  const gy = -fromP(py);
  if (Math.abs(gx) > RANGE || Math.abs(gy) > RANGE) return;

  const s = state[idx];
  const eq = EQUATIONS[idx];
  const existIdx = s.points.findIndex(p => p.x === gx && p.y === gy);
  if (existIdx >= 0) {
    s.points.splice(existIdx, 1);
    s.pointFeedback = null;
  } else {
    s.points.push({ x: gx, y: gy });
    // Check if point is on the line
    const correctY = eq.fn(gx);
    if (Math.abs(correctY - gy) < 0.01) {
      s.pointFeedback = { type: 'match', msg: `✓ (${gx}, ${gy}) is on the line!` };
    } else {
      s.pointFeedback = { type: 'miss', msg: `(${gx}, ${gy}) is not on this line. Try again!` };
    }
  }
  render(idx);
}

function render(idx) {
  const eq = EQUATIONS[idx];
  const s = state[idx];
  const card = document.getElementById(`card-${idx}`);
  
  // Badge
  const badge = card.querySelector('.eq-badge');
  badge.className = 'eq-badge' + (s.complete ? ' done' : '');
  
  // Card border
  card.className = 'card' + (s.complete ? ' completed' : '');

  // Feedback
  const fbEl = card.querySelector('.feedback-area');
  if (s.feedback) {
    fbEl.innerHTML = `<div class="feedback ${s.feedback.type}">${s.feedback.msg}</div>`;
  } else {
    fbEl.innerHTML = '';
  }

  // Step prompt
  const spEl = card.querySelector('.step-area');
  if (s.stepPrompt) {
    spEl.innerHTML = `<div class="step-prompt">${s.stepPrompt}</div>`;
  } else {
    spEl.innerHTML = '';
  }

  // Table cells
  eq.xVals.forEach((xv, i) => {
    const td = card.querySelector(`.y-cell-${i}`);
    const result = s.cellResults ? s.cellResults[i] : null;
    td.className = `y-cell y-cell-${i}` + (result === 'correct' ? ' correct' : '') + (result === 'wrong' ? ' wrong' : '') + (s.revealed.has(i) ? ' revealed' : '');
    
    if (s.revealed.has(i)) {
      td.innerHTML = `<span class="revealed-val">${s.yVals[i]}</span>`;
    } else {
      const input = td.querySelector('.y-input');
      if (input) input.value = s.yVals[i];
    }
  });

  // Attempts
  const attEl = card.querySelector('.attempts');
  attEl.textContent = s.attempts > 0 ? `Attempts: ${s.attempts}` : '';

  // Show answer button visibility
  const showBtn = card.querySelector('.btn-show');
  showBtn.style.display = s.attempts >= 2 ? 'inline-block' : 'none';

  // SVG
  const gridWrap = card.querySelector('.grid-svg');
  gridWrap.innerHTML = buildSVG(idx);
  gridWrap.querySelector('svg').addEventListener('click', e => handleGridClick(idx, e));

  // Point feedback
  const pfEl = card.querySelector('.point-feedback');
  if (s.pointFeedback) {
    pfEl.className = 'point-feedback ' + s.pointFeedback.type;
    pfEl.textContent = s.pointFeedback.msg;
  } else {
    pfEl.className = 'point-feedback';
    pfEl.textContent = '';
  }
}

function buildCard(idx) {
  const eq = EQUATIONS[idx];
  const s = state[idx];

  let tableRows = '';
  eq.xVals.forEach((xv, i) => {
    tableRows += `<tr>
      <td class="x-cell">${xv}</td>
      <td class="y-cell y-cell-${i}">
        <input type="text" class="y-input" data-idx="${idx}" data-i="${i}" value="" inputmode="numeric">
      </td>
    </tr>`;
  });

  return `
  <div class="card" id="card-${idx}">
    <div class="card-header">
      <div style="display:flex;align-items:center">
        <span class="eq-badge">${eq.id}</span>
        <span class="eq-label">${eq.label}</span>
      </div>
      <div class="btn-group">
        <button class="btn btn-hint" onclick="getHint(${idx})">💡 Hint</button>
        <button class="btn btn-check" onclick="checkAnswers(${idx})">Check</button>
        <button class="btn btn-show" style="display:none" onclick="showAnswer(${idx})">Show Answer</button>
        <button class="btn btn-reset" onclick="resetEq(${idx})">Reset</button>
      </div>
    </div>
    <div class="feedback-area"></div>
    <div class="card-content">
      <div>
        <table class="eq-table">
          <thead><tr><th>Input (x)</th><th>${eq.label}</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
        <div class="attempts"></div>
      </div>
      <div class="grid-wrap">
        <div class="grid-svg"></div>
        <div class="grid-help">Click to plot points · click again to remove</div>
        <div class="point-feedback"></div>
      </div>
    </div>
    <div class="step-area"></div>
  </div>`;
}

// Initialize
const cardsEl = document.getElementById('cards');
EQUATIONS.forEach((eq, idx) => {
  cardsEl.insertAdjacentHTML('beforeend', buildCard(idx));
});

// Render SVGs and attach input listeners
EQUATIONS.forEach((eq, idx) => {
  render(idx);
});

document.addEventListener('input', e => {
  if (e.target.classList.contains('y-input')) {
    const idx = parseInt(e.target.dataset.idx);
    const i = parseInt(e.target.dataset.i);
    state[idx].yVals[i] = e.target.value;
    state[idx].feedback = null;
    state[idx].stepPrompt = null;
    state[idx].cellResults = null;
    state[idx].showLine = false;
    // Light re-render (just clear feedback styling)
    const card = document.getElementById(`card-${idx}`);
    EQUATIONS[idx].xVals.forEach((_, j) => {
      const td = card.querySelector(`.y-cell-${j}`);
      td.className = `y-cell y-cell-${j}`;
    });
    card.querySelector('.feedback-area').innerHTML = '';
    card.querySelector('.step-area').innerHTML = '';
  }
});
</script>
</body>
</html>
