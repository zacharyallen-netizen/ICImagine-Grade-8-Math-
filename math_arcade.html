<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Math Arcade — IC Imagine</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1E2D4F;--gold:#FFC107;--bg:#0a1228;--card:#15264a;--cyan:#00f0ff;--mag:#ff4dd6;--grn:#00ff88;--red:#ff3860;--yel:#ffe21f;--txt:#e6ecff;--dim:#94a3c4;--bdr:#2a3f6a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.5;background-image:radial-gradient(circle at 20% 10%,rgba(0,240,255,0.08) 0,transparent 40%),radial-gradient(circle at 85% 80%,rgba(255,77,214,0.08) 0,transparent 40%),linear-gradient(180deg,#0a1228 0,#06091a 100%)}
.pixel{font-family:'Press Start 2P',monospace;letter-spacing:.5px}
.term{font-family:'VT323',monospace}
nav.top{background:rgba(10,18,40,.95);backdrop-filter:blur(8px);border-bottom:2px solid var(--gold);padding:10px 16px;position:sticky;top:0;z-index:50}
.nav-row{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.brand{font-family:'Press Start 2P',monospace;font-size:.78em;color:var(--gold);text-shadow:0 0 8px rgba(255,193,7,.4)}
.brand span{color:var(--cyan)}
.coins{margin-left:auto;background:var(--navy);border:2px solid var(--gold);padding:6px 12px;border-radius:6px;font-family:'Press Start 2P',monospace;font-size:.65em;color:var(--gold);box-shadow:0 0 12px rgba(255,193,7,.25)}
.coins .v{color:var(--yel)}
.nb{font-family:'Inter',sans-serif;font-size:.78em;font-weight:700;padding:7px 12px;background:rgba(255,255,255,.06);border:2px solid var(--bdr);border-radius:5px;color:var(--txt);text-decoration:none;cursor:pointer;transition:all .15s}
.nb:hover{border-color:var(--cyan);color:var(--cyan)}
.wrap{max-width:1200px;margin:0 auto;padding:18px 16px 80px}
.hero{text-align:center;padding:30px 16px 22px;border:3px solid var(--gold);border-radius:14px;background:linear-gradient(135deg,#0a1228,#152748,#0a1228);position:relative;overflow:hidden;margin-bottom:22px}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,240,255,.03) 3px,rgba(0,240,255,.03) 4px);pointer-events:none}
.hero h1{font-family:'Press Start 2P',monospace;font-size:1.7em;color:var(--gold);text-shadow:3px 3px 0 var(--mag),6px 6px 0 var(--cyan);margin-bottom:14px;line-height:1.2;position:relative}
.hero p{color:var(--dim);font-size:1em;max-width:640px;margin:0 auto;position:relative}
.tag-row{display:flex;justify-content:center;gap:6px;margin-top:14px;flex-wrap:wrap;position:relative}
.tag{font-family:'VT323',monospace;font-size:1.1em;padding:3px 10px;background:rgba(255,193,7,.1);border:1px solid var(--gold);color:var(--gold);border-radius:4px}
.section-hdr{font-family:'Press Start 2P',monospace;font-size:.75em;color:var(--gold);margin:22px 0 10px;padding-bottom:6px;border-bottom:1px dashed var(--bdr)}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
.gcard{background:var(--card);border:2px solid var(--bdr);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:6px}
.gcard:hover{transform:translateY(-3px);border-color:var(--red);box-shadow:0 6px 22px rgba(255,56,96,.25)}
.gcard .ico{font-size:2.4em;line-height:1}
.gcard .ttl{font-family:'Press Start 2P',monospace;font-size:.72em;color:var(--gold);line-height:1.4;margin:4px 0 2px}
.gcard .dsc{font-size:.86em;color:var(--dim);min-height:42px}
.gcard .meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-family:'VT323',monospace;font-size:.95em}
.gcard .unit{color:var(--cyan)}
.gcard .badge{padding:2px 8px;border-radius:10px;font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:.3px;background:rgba(255,56,96,.18);color:var(--red);border:1px solid var(--red);font-family:'Inter',sans-serif}
.game-view{background:var(--card);border:3px solid var(--gold);border-radius:14px;padding:18px;display:none;animation:fi .25s}
.game-view.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.game-hdr{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;border-bottom:1px solid var(--bdr);padding-bottom:10px}
.game-hdr h2{font-family:'Press Start 2P',monospace;font-size:.92em;color:var(--gold);line-height:1.3}
.game-hdr .meta-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:.85em;color:var(--dim);margin-top:4px}
.game-hdr .meta-row span{padding:2px 8px;background:rgba(0,240,255,.08);border:1px solid var(--cyan);color:var(--cyan);border-radius:4px;font-family:'VT323',monospace;font-size:1.05em}
.back-btn{font-family:'Inter',sans-serif;font-weight:700;font-size:.85em;padding:8px 14px;background:transparent;border:2px solid var(--bdr);border-radius:6px;color:var(--txt);cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--red);color:var(--red)}
#mount{margin-top:12px}
.btn{font-family:'Inter',sans-serif;font-weight:700;padding:9px 16px;background:var(--gold);color:var(--navy);border:none;border-radius:5px;cursor:pointer;font-size:.9em;transition:all .15s}
.btn:hover{background:#ffd13a;transform:translateY(-1px)}
.btn-cyan{background:var(--cyan);color:var(--navy)}
.btn-mag{background:var(--mag);color:#fff}
.btn-grn{background:var(--grn);color:var(--navy)}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;border:2px solid var(--bdr);color:var(--txt)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.hud{display:flex;gap:14px;flex-wrap:wrap;padding:10px 14px;background:rgba(0,0,0,.3);border-radius:8px;margin-bottom:12px;border:1px solid var(--bdr);font-family:'VT323',monospace;font-size:1.18em}
.hud b{color:var(--gold);margin-right:5px}
.hud .stat span{color:var(--cyan);font-weight:700}
.hud .danger span{color:var(--red)!important}
.hud .ok span{color:var(--grn)!important}
.gmsg{padding:11px 16px;background:rgba(0,0,0,.4);border-left:4px solid var(--cyan);border-radius:0 8px 8px 0;margin:10px 0;font-family:'VT323',monospace;font-size:1.18em;min-height:46px}
.gmsg.win{border-color:var(--grn);background:rgba(0,255,136,.1);color:var(--grn)}
.gmsg.lose{border-color:var(--red);background:rgba(255,56,96,.1);color:var(--red)}
.hbar{height:14px;background:rgba(255,255,255,.08);border:1px solid var(--bdr);border-radius:7px;overflow:hidden;min-width:160px;flex:1;max-width:300px}
.hbar > div{height:100%;background:linear-gradient(90deg,var(--grn),#00cc66);transition:width .3s}
.hbar.danger > div{background:linear-gradient(90deg,var(--red),#cc1a3d)}
.hbar.boss > div{background:linear-gradient(90deg,var(--mag),#9b1c8a)}
/* Integer Outbreak grid */
.io-grid{display:grid;gap:2px;background:var(--bg);padding:4px;border:2px solid var(--gold);border-radius:6px;width:fit-content;margin:8px auto;user-select:none}
.io-cell{width:42px;height:42px;background:var(--card);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;font-size:1.05em;font-weight:700;color:var(--txt)}
.io-cell.add{background:rgba(0,255,136,.18);border-color:var(--grn);color:var(--grn)}
.io-cell.sub{background:rgba(255,56,96,.18);border-color:var(--red);color:var(--red)}
.io-cell.mul{background:rgba(255,226,31,.18);border-color:var(--yel);color:var(--yel)}
.io-cell.div{background:rgba(0,240,255,.16);border-color:var(--cyan);color:var(--cyan)}
.io-cell.player{background:var(--gold)!important;color:var(--navy);box-shadow:0 0 12px var(--gold);font-size:1.6em;animation:pulse 1.2s infinite}
@keyframes pulse{50%{box-shadow:0 0 18px var(--gold)}}
.io-cell.exit{background:var(--mag)!important;color:#fff;box-shadow:0 0 12px var(--mag);font-size:1.6em}
.io-cell.visited{opacity:.32}
.io-pad{display:grid;grid-template-columns:repeat(3,46px);gap:5px;justify-content:center;margin-top:14px}
.io-pad button{height:42px;font-family:'Press Start 2P',monospace;font-size:.78em;background:var(--card);border:2px solid var(--bdr);color:var(--txt);border-radius:6px;cursor:pointer}
.io-pad button:hover{border-color:var(--cyan);color:var(--cyan)}
.io-pad button:active{background:var(--cyan);color:var(--navy)}
@media (max-width:520px){.io-cell{width:36px;height:36px;font-size:.95em}}
/* Mult Matrix */
.mm-stage{position:relative;background:#040814;border:2px solid var(--gold);border-radius:8px;height:380px;overflow:hidden;margin:8px auto;max-width:520px}
.mm-tile{position:absolute;background:var(--card);border:2px solid var(--cyan);border-radius:6px;padding:6px 10px;font-family:'Press Start 2P',monospace;font-size:.95em;color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,.4);transition:transform .15s}
.mm-tile.warn{border-color:var(--yel);color:var(--yel);box-shadow:0 0 12px rgba(255,226,31,.5)}
.mm-tile.danger{border-color:var(--red);color:var(--red);box-shadow:0 0 14px rgba(255,56,96,.6);animation:shake .25s infinite}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
.mm-tile.poof{animation:poof .35s forwards}
@keyframes poof{to{transform:scale(1.5);opacity:0}}
.mm-floor{position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--red);box-shadow:0 -8px 16px rgba(255,56,96,.4)}
.mm-choices{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;max-width:520px;margin-left:auto;margin-right:auto}
.mm-choice{font-family:'Press Start 2P',monospace;font-size:.78em;padding:14px 10px;background:var(--card);border:2px solid var(--bdr);color:var(--txt);border-radius:6px;cursor:pointer;transition:all .12s}
.mm-choice:hover{border-color:var(--grn);color:var(--grn);transform:scale(1.02)}
.mm-choice:active{background:var(--grn);color:var(--navy)}
/* Target Number Arena */
.tn-target{text-align:center;padding:14px;background:linear-gradient(135deg,var(--mag),#9b1c8a);border-radius:10px;border:2px solid var(--gold);margin-bottom:12px}
.tn-target .lbl{font-family:'Press Start 2P',monospace;font-size:.65em;color:var(--gold);margin-bottom:4px}
.tn-target .v{font-family:'Press Start 2P',monospace;font-size:2em;color:#fff;text-shadow:2px 2px 0 var(--navy)}
.tn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.tn-num{width:60px;height:60px;font-family:'Press Start 2P',monospace;font-size:1em;background:var(--card);border:2px solid var(--cyan);color:var(--cyan);border-radius:8px;cursor:pointer;transition:all .15s}
.tn-num:hover:not(:disabled){background:var(--cyan);color:var(--navy);transform:translateY(-2px)}
.tn-num:disabled{opacity:.25;cursor:not-allowed;text-decoration:line-through}
.tn-op{width:48px;height:48px;font-family:'Press Start 2P',monospace;font-size:.95em;background:var(--card);border:2px solid var(--yel);color:var(--yel);border-radius:8px;cursor:pointer;transition:all .15s}
.tn-op:hover{background:var(--yel);color:var(--navy)}
.tn-expr{padding:14px 16px;background:rgba(0,0,0,.4);border:2px dashed var(--bdr);border-radius:8px;margin:10px 0;text-align:center;font-family:'VT323',monospace;font-size:1.6em;min-height:60px;color:var(--txt);word-break:break-all}
.tn-expr .ph{color:var(--dim);font-size:.7em}
/* Climb */
.cl-stage{position:relative;background:linear-gradient(180deg,#0a1228 0,#152748 50%,#0a1228 100%);border:2px solid var(--gold);border-radius:8px;height:440px;overflow:hidden;margin:8px auto;max-width:380px}
.cl-platform{position:absolute;left:50%;transform:translateX(-50%);width:75%;height:14px;background:var(--card);border:2px solid var(--bdr);border-radius:3px;display:flex;align-items:center;justify-content:center}
.cl-platform.cleared{border-color:var(--grn);background:rgba(0,255,136,.18);box-shadow:0 0 10px rgba(0,255,136,.3)}
.cl-platform.top{border-color:var(--gold);background:rgba(255,193,7,.2);box-shadow:0 0 14px rgba(255,193,7,.4)}
.cl-platform .star{font-size:.95em}
.cl-player{position:absolute;left:50%;transform:translateX(-50%);font-size:1.8em;transition:bottom .5s cubic-bezier(.5,1.6,.5,1);z-index:5;filter:drop-shadow(0 0 8px var(--gold))}
.cl-player.fall{transition:bottom .8s cubic-bezier(.5,0,.7,1.6)}
.cl-prob{padding:14px;background:rgba(0,0,0,.5);border:2px solid var(--cyan);border-radius:8px;margin-top:10px;text-align:center}
.cl-prob .q{font-family:'Press Start 2P',monospace;font-size:1.1em;color:var(--gold);margin-bottom:10px}
.cl-prob .timer{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:12px}
.cl-prob .timer > div{height:100%;background:linear-gradient(90deg,var(--grn),var(--yel),var(--red));transition:width 1s linear}
.cl-choices{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
/* Boss */
.bs-arena{padding:16px;background:linear-gradient(180deg,#1a0a2a,#0a0518);border:2px solid var(--mag);border-radius:10px;margin:8px auto;max-width:560px;text-align:center;position:relative;overflow:hidden}
.bs-arena::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(255,77,214,.18),transparent 60%);pointer-events:none}
.bs-name{font-family:'Press Start 2P',monospace;font-size:.95em;color:var(--mag);text-shadow:2px 2px 0 var(--navy);margin-bottom:8px;position:relative}
.bs-sprite{font-size:5em;margin:8px 0;filter:drop-shadow(0 0 14px var(--mag));animation:bossbob 2.5s ease-in-out infinite;position:relative}
@keyframes bossbob{50%{transform:translateY(-6px)}}
.bs-sprite.hit{animation:bosshit .35s}
@keyframes bosshit{0%{filter:drop-shadow(0 0 14px var(--red)) brightness(2)}100%{filter:drop-shadow(0 0 14px var(--mag))}}
.bs-bars{display:flex;flex-direction:column;gap:6px;max-width:380px;margin:10px auto;position:relative}
.bs-bars .row{display:flex;align-items:center;gap:8px;font-family:'Press Start 2P',monospace;font-size:.62em}
.bs-bars .row .lbl{color:var(--gold);min-width:60px;text-align:left}
.bs-prob{padding:14px;background:rgba(0,0,0,.45);border:2px solid var(--cyan);border-radius:8px;margin-top:14px;position:relative}
.bs-prob .q{font-family:'Press Start 2P',monospace;font-size:1em;color:var(--gold);margin-bottom:10px}
.bs-prob .timer{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:12px}
.bs-prob .timer > div{height:100%;background:linear-gradient(90deg,var(--grn),var(--yel),var(--red));transition:width .9s linear}
.bs-choices{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.bs-flash{position:absolute;inset:0;background:var(--red);opacity:0;pointer-events:none}
.bs-flash.show{animation:flash .4s}
@keyframes flash{0%{opacity:0}30%{opacity:.5}100%{opacity:0}}
</style>
</head>
<body>

<nav class="top">
<div class="nav-row">
  <span class="brand">🎮 <span>IC IMAGINE</span> · MATH ARCADE</span>
  <a class="nb" href="index.html">🏠 Home</a>
  <a class="nb" href="fluency.html">⚡ Fluency</a>
  <span class="coins">🪙 <span class="v" id="coinDisplay">0</span></span>
</div>
</nav>

<div class="wrap" id="top">
  <div class="hero">
    <h1>MATH ARCADE</h1>
    <p>Five action-packed games where math drives every move. Earn coins, climb scores, and reinforce skills from across the curriculum.</p>
    <div class="tag-row">
      <span class="tag">5 GAMES</span>
      <span class="tag">ACTION</span>
      <span class="tag">COIN ECONOMY</span>
    </div>
  </div>

  <div id="hub">
    <div class="section-hdr">▶ ACTION</div>
    <div class="hub-grid" id="hubGrid"></div>
  </div>

  <div class="game-view" id="gameView">
    <div class="game-hdr">
      <div>
        <h2 id="gTitle"></h2>
        <div class="meta-row" id="gMeta"></div>
      </div>
      <button class="back-btn" onclick="Arcade.back()">← Back to Arcade</button>
    </div>
    <div id="mount"></div>
  </div>
</div>

<script>
/* ═════════════════════════════════════════
   ARCADE FRAMEWORK
   ═════════════════════════════════════════ */
const Arcade = {
  coins: 0,
  current:null, cleanup:null,
  loadCoins(){try{return parseInt(localStorage.getItem('arcadeCoins')||'0')||0}catch(e){return 0}},
  saveCoins(){try{localStorage.setItem('arcadeCoins',this.coins)}catch(e){}},
  init(){
    this.coins = this.loadCoins();
    this.updateCoins();
    const grid = document.getElementById('hubGrid');
    Object.entries(Games).forEach(([id,g])=>{
      const c = document.createElement('div');
      c.className = 'gcard';
      c.innerHTML = `
        <div class="ico">${g.icon}</div>
        <div class="ttl">${g.name}</div>
        <div class="dsc">${g.desc}</div>
        <div class="meta"><span class="unit">${g.unit}</span><span class="badge">${g.tag}</span></div>`;
      c.onclick = ()=>this.launch(id);
      grid.appendChild(c);
    });
  },
  launch(id){
    if(this.cleanup){try{this.cleanup()}catch(e){}}
    this.current = id;
    const g = Games[id];
    document.getElementById('hub').style.display='none';
    document.getElementById('gameView').classList.add('active');
    document.getElementById('gTitle').textContent = g.name;
    document.getElementById('gMeta').innerHTML = `<span>${g.unit}</span><span>${g.tag}</span>`;
    const mount = document.getElementById('mount');
    mount.innerHTML='';
    const result = g.init(mount);
    this.cleanup = result && result.cleanup ? result.cleanup : null;
    window.scrollTo({top:0,behavior:'smooth'});
  },
  back(){
    if(this.cleanup){try{this.cleanup()}catch(e){}this.cleanup=null}
    document.getElementById('gameView').classList.remove('active');
    document.getElementById('hub').style.display='block';
    document.getElementById('mount').innerHTML='';
    // clear hash so refresh doesn't relaunch
    if(history.replaceState) history.replaceState(null,'',window.location.pathname+window.location.search);
  },
  fromHash(){
    const id = (window.location.hash||'').replace('#','');
    if(id && Games[id]) this.launch(id);
  },
  earn(n){
    this.coins += n;
    this.saveCoins();
    this.updateCoins();
    this.coinPop(n);
  },
  updateCoins(){document.getElementById('coinDisplay').textContent=this.coins},
  coinPop(n){
    const el = document.getElementById('coinDisplay').parentElement;
    el.style.transform='scale(1.2)';el.style.transition='transform .25s';
    setTimeout(()=>{el.style.transform='scale(1)'},250);
  }
};
const $ = (sel,p=document)=>p.querySelector(sel);
const ce = (tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e};
const rand = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const shuffle = a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};

const Games = {};

/* ═════════════════════════════════════════
   GAME 1 — INTEGER OUTBREAK
   Survive an 8×8 grid where each tile applies an integer
   operation to your HP. Reach the exit alive.
   ═════════════════════════════════════════ */
Games.integer_outbreak = {
  name:'INTEGER OUTBREAK', icon:'☣️', tag:'SURVIVAL',
  unit:'Pre-Algebra · Integers', desc:'Pick a path through the toxic grid. Each tile changes your HP. Reach the exit alive!',
  init(mount){
    const W=7, H=7;
    let hp=30, px=0, py=0, won=false, dead=false, steps=0, grid=[];
    const ops = [
      ()=>({type:'add',val:rand(1,8),sym:`+${rand(1,8)}`,cls:'add'}),
      ()=>({type:'sub',val:rand(1,7),sym:'',cls:'sub'}),
      ()=>({type:'mul',val:2,sym:'×2',cls:'mul'}),
      ()=>({type:'div',val:2,sym:'÷2',cls:'div'}),
      ()=>({type:'add',val:-rand(1,5),sym:'',cls:'sub'}),
      ()=>({type:'sub',val:-rand(1,5),sym:'',cls:'add'})
    ];
    function genGrid(){
      grid=[];
      for(let y=0;y<H;y++){
        const row=[];
        for(let x=0;x<W;x++){
          if(x===0&&y===0) row.push({type:'start',sym:'',cls:''});
          else if(x===W-1&&y===H-1) row.push({type:'exit',sym:'★',cls:'exit'});
          else{
            const c = ops[rand(0,ops.length-1)]();
            // build sym for adds with negatives
            if(c.type==='add'){c.sym = c.val>=0?`+${c.val}`:`${c.val}`}
            else if(c.type==='sub'){c.sym = c.val>=0?`-${c.val}`:`+${-c.val}`}
            row.push(c);
          }
        }
        grid.push(row);
      }
    }
    function apply(c,h){
      if(c.type==='add')return h+c.val;
      if(c.type==='sub')return h-c.val;
      if(c.type==='mul')return h*c.val;
      if(c.type==='div')return Math.floor(h/c.val);
      return h;
    }
    function move(dx,dy){
      if(won||dead) return;
      const nx=px+dx, ny=py+dy;
      if(nx<0||ny<0||nx>=W||ny>=H) return;
      px=nx; py=ny; steps++;
      const c=grid[ny][nx];
      if(c.type==='exit'){
        if(hp>0){won=true;const reward=Math.max(5,Math.floor(hp));Arcade.earn(reward);msg(`✅ ESCAPED with HP=${hp} in ${steps} steps! +${reward} 🪙`,'win')}
        else{dead=true;msg('💀 Reached exit but already dead.','lose')}
      } else if(!c.visited){
        c.visited=true;
        const oldHp=hp;
        hp=apply(c,hp);
        if(hp<=0){dead=true;msg(`💀 ${oldHp} ${c.sym} = ${hp} — you died!`,'lose')}
        else msg(`Stepped on ${c.sym} → HP went ${oldHp} to ${hp}`,'');
      } else msg('Tile already used — no effect.','');
      render();
    }
    function msg(t,cls){
      const m = $('#ioMsg',mount);
      if(m){m.textContent=t;m.className='gmsg '+(cls||'')}
    }
    function render(){
      const cells = mount.querySelectorAll('.io-cell');
      cells.forEach(el=>{
        const x=+el.dataset.x, y=+el.dataset.y;
        const c=grid[y][x];
        el.className = 'io-cell '+(c.cls||'');
        if(c.visited && !(x===px&&y===py) && c.type!=='exit') el.classList.add('visited');
        if(x===px&&y===py){el.classList.add('player');el.textContent='⊙'}
        else if(c.type==='exit'){el.classList.add('exit');el.textContent='★'}
        else if(c.type==='start'){el.textContent='S'}
        else{el.textContent=c.sym}
      });
      $('#ioHp',mount).textContent=hp;
      $('#ioSteps',mount).textContent=steps;
      const pct = Math.max(0,Math.min(100,(hp/30)*100));
      const bar = $('#ioBar',mount);
      bar.firstElementChild.style.width=pct+'%';
      bar.classList.toggle('danger',hp<=10);
    }
    function reset(){hp=30;px=0;py=0;won=false;dead=false;steps=0;genGrid();render();msg('Use arrow keys or buttons. Plan your path!','')}
    // Build DOM
    mount.innerHTML = `
      <div class="hud">
        <span class="stat"><b>HP</b><span id="ioHp">30</span>/30</span>
        <span class="stat"><b>STEPS</b><span id="ioSteps">0</span></span>
        <div class="hbar" id="ioBar" style="margin-left:auto"><div style="width:100%"></div></div>
      </div>
      <div class="io-grid" id="ioGrid"></div>
      <div class="io-pad">
        <div></div><button data-d="up">↑</button><div></div>
        <button data-d="left">←</button><button data-d="down">↓</button><button data-d="right">→</button>
      </div>
      <div class="gmsg" id="ioMsg">Use arrow keys or buttons. Plan your path!</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
        <button class="btn btn-cyan" id="ioReset">🔄 New Map</button>
      </div>
      <details style="margin-top:12px;color:var(--dim);font-size:.88em">
        <summary style="cursor:pointer;color:var(--cyan);font-weight:700">📖 How tiles work</summary>
        <div style="padding:8px 0">
          • <span style="color:var(--grn)">Green +N</span>: gain N HP &nbsp;·&nbsp; <span style="color:var(--red)">Red −N</span>: lose N HP<br>
          • <span style="color:var(--yel)">Yellow ×2</span>: double HP &nbsp;·&nbsp; <span style="color:var(--cyan)">Cyan ÷2</span>: halve HP (rounded down)<br>
          • Some adds use <em>negative numbers</em> like +(−3) so practice your integer rules!<br>
          • Visited tiles fade — you can revisit, no effect.
        </div>
      </details>`;
    const gridEl = $('#ioGrid',mount);
    gridEl.style.gridTemplateColumns=`repeat(${W},1fr)`;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){
      const el = ce('div','io-cell','');
      el.dataset.x=x;el.dataset.y=y;
      gridEl.appendChild(el);
    }
    genGrid();render();
    // controls
    const onKey = e=>{
      const k=e.key;
      if(k==='ArrowUp'||k==='w'){move(0,-1);e.preventDefault()}
      else if(k==='ArrowDown'||k==='s'){move(0,1);e.preventDefault()}
      else if(k==='ArrowLeft'||k==='a'){move(-1,0);e.preventDefault()}
      else if(k==='ArrowRight'||k==='d'){move(1,0);e.preventDefault()}
    };
    document.addEventListener('keydown',onKey);
    mount.querySelectorAll('.io-pad button').forEach(b=>{
      b.onclick=()=>{const d=b.dataset.d;
        if(d==='up')move(0,-1);else if(d==='down')move(0,1);
        else if(d==='left')move(-1,0);else move(1,0);}
    });
    $('#ioReset',mount).onclick=reset;
    return {cleanup(){document.removeEventListener('keydown',onKey)}};
  }
};

/* ═════════════════════════════════════════
   GAME 2 — MULTIPLICATION MATRIX
   Falling product tiles. Click the matching factor pair
   button to clear them before they hit the floor.
   ═════════════════════════════════════════ */
Games.mult_matrix = {
  name:'MULTIPLICATION MATRIX', icon:'✖️', tag:'ARCADE',
  unit:'Multiplication Fluency · Factors', desc:'Falling products. Click the right factor pair to blast them. Three misses = game over!',
  init(mount){
    let tiles=[], score=0, lives=3, level=1, raf, lastSpawn=0, lastTime=0, paused=false, gameOver=false, choices=[];
    function spawn(){
      if(gameOver) return;
      const a=rand(2,12), b=rand(2,12);
      const stage = $('#mmStage',mount);
      const w = stage.clientWidth;
      tiles.push({a,b,val:a*b,x:rand(20,w-60),y:-30,el:null});
      rebuildChoices();
    }
    function factorPairsFor(prod){
      const out=[];
      for(let i=2;i<=12;i++) if(prod%i===0 && prod/i>=2 && prod/i<=12) out.push([i,prod/i]);
      return out;
    }
    function rebuildChoices(){
      // Build choice set so EVERY on-screen tile has at least one valid factor-pair choice.
      const set = new Set();
      // For each tile, add one factor pair (random) to the set
      tiles.forEach(t=>{
        const fps = factorPairsFor(t.val);
        if(fps.length===0) return;
        const fp = fps[rand(0,fps.length-1)];
        set.add(`${fp[0]}×${fp[1]}`);
      });
      // pad with distractors that DON'T match any on-screen tile
      const onScreenVals = new Set(tiles.map(t=>t.val));
      let attempts=0;
      while(set.size<4 && attempts<100){
        attempts++;
        const a=rand(2,12),b=rand(2,12);
        if(!onScreenVals.has(a*b)) set.add(`${a}×${b}`);
      }
      // worst case if board is super dense: pad with anything
      while(set.size<4){const a=rand(2,12),b=rand(2,12);set.add(`${a}×${b}`)}
      const choices = shuffle([...set]);
      const ch = $('#mmChoices',mount);
      ch.innerHTML='';
      choices.forEach(s=>{
        const [aa,bb]=s.split('×').map(Number);
        const btn = ce('button','mm-choice',s);
        btn.onclick=()=>tryClear(aa*bb,btn);
        ch.appendChild(btn);
      });
    }
    function tryClear(prod,btnEl){
      // find the lowest tile (largest y) matching prod
      const matching = tiles.filter(t=>t.val===prod).sort((a,b)=>b.y-a.y)[0];
      if(matching){
        matching.el.classList.add('poof');
        const el=matching.el;
        setTimeout(()=>el.remove(),350);
        tiles = tiles.filter(t=>t!==matching);
        score++;
        if(score%5===0) level++;
        update();
        rebuildChoices();
      } else {
        // miss flash
        btnEl.style.background='rgba(255,56,96,0.4)';
        setTimeout(()=>{btnEl.style.background=''},220);
      }
    }
    function loop(t){
      if(paused||gameOver){raf=requestAnimationFrame(loop);return}
      const dt = lastTime? (t-lastTime)/1000 : 0;
      lastTime = t;
      // spawn rate scales with level
      if(t-lastSpawn > Math.max(1500-level*120, 600) && tiles.length<3){
        lastSpawn = t;
        spawn();
      }
      const speed = 35 + level*8; // px/sec
      const stage = $('#mmStage',mount);
      const floorY = stage.clientHeight - 30;
      tiles.forEach(t=>{
        t.y += speed*dt;
        if(!t.el){
          t.el = ce('div','mm-tile',t.val);
          t.el.style.left = t.x+'px';
          stage.appendChild(t.el);
        }
        t.el.style.top = t.y+'px';
        if(t.y > floorY*0.55) t.el.classList.add('warn');
        if(t.y > floorY*0.78) t.el.classList.add('danger');
        if(t.y > floorY){
          t.el.remove();
          lives--;
          flashFloor();
          if(lives<=0){endGame()}
        }
      });
      tiles = tiles.filter(t=>t.y<=floorY);
      update();
      raf=requestAnimationFrame(loop);
    }
    function flashFloor(){
      const f = $('#mmFloor',mount);
      f.style.boxShadow='0 -22px 40px rgba(255,56,96,.85)';
      setTimeout(()=>{f.style.boxShadow=''},300);
    }
    function update(){
      $('#mmScore',mount).textContent=score;
      $('#mmLives',mount).textContent='♥'.repeat(lives);
      $('#mmLevel',mount).textContent=level;
    }
    function endGame(){
      gameOver=true;
      const reward = score;
      if(reward>0) Arcade.earn(reward);
      const m = $('#mmMsg',mount);
      m.textContent = `💀 Game Over · Score ${score} · +${reward} 🪙 earned`;
      m.className='gmsg lose';
      $('#mmChoices',mount).innerHTML='<button class="btn btn-cyan" id="mmRestart" style="grid-column:1/-1">🔄 Play Again</button>';
      $('#mmRestart',mount).onclick=()=>{tiles.forEach(t=>t.el&&t.el.remove());tiles=[];score=0;lives=3;level=1;gameOver=false;lastSpawn=performance.now();spawn();$('#mmMsg',mount).textContent='Tap the factor pair that equals the falling product. Lower tiles = more urgent!';$('#mmMsg',mount).className='gmsg';update()};
    }
    mount.innerHTML = `
      <div class="hud">
        <span class="stat"><b>SCORE</b><span id="mmScore">0</span></span>
        <span class="stat"><b>LEVEL</b><span id="mmLevel">1</span></span>
        <span class="stat"><b>LIVES</b><span id="mmLives" style="color:var(--red)">♥♥♥</span></span>
      </div>
      <div class="mm-stage" id="mmStage"><div class="mm-floor" id="mmFloor"></div></div>
      <div class="mm-choices" id="mmChoices"></div>
      <div class="gmsg" id="mmMsg">Tap the factor pair that equals the falling product. Lower tiles = more urgent!</div>`;
    spawn();
    raf = requestAnimationFrame(loop);
    return {cleanup(){gameOver=true;cancelAnimationFrame(raf);tiles.forEach(t=>t.el&&t.el.remove())}};
  }
};

/* ═════════════════════════════════════════
   GAME 3 — TARGET NUMBER ARENA
   Combine 4 numbers with +, −, ×, ÷, ( ) to hit the target
   (24 by default). Like the classic 24 game.
   ═════════════════════════════════════════ */
Games.target_number = {
  name:'TARGET NUMBER ARENA', icon:'🎯', tag:'PUZZLE',
  unit:'Order of Operations · Expressions', desc:'Combine four numbers using +, −, ×, ÷ to hit the target. Use each number exactly once.',
  init(mount){
    let nums=[], target=24, expr='', lastTok=null, parens=0, solved=0;
    // Brute-force solvability check: try all permutations + operator combos + 5 parenthesizations
    function isSolvable(values, tgt){
      const ops = ['+','-','*','/'];
      const perms = [];
      const seen = new Set();
      const permute = (arr, m=[])=>{
        if(arr.length===0){const k=m.join(',');if(!seen.has(k)){seen.add(k);perms.push([...m])}return}
        for(let i=0;i<arr.length;i++){
          const cur = arr.slice();
          const next = cur.splice(i,1);
          permute(cur, m.concat(next));
        }
      };
      permute(values);
      // 5 parenthesizations of a b c d
      const shapes = [
        (a,b,c,d,o1,o2,o3)=>op(op(op(a,b,o1),c,o2),d,o3),
        (a,b,c,d,o1,o2,o3)=>op(op(a,op(b,c,o2),o1),d,o3),
        (a,b,c,d,o1,o2,o3)=>op(op(a,b,o1),op(c,d,o3),o2),
        (a,b,c,d,o1,o2,o3)=>op(a,op(op(b,c,o2),d,o3),o1),
        (a,b,c,d,o1,o2,o3)=>op(a,op(b,op(c,d,o3),o2),o1),
      ];
      function op(x,y,o){if(o==='+')return x+y;if(o==='-')return x-y;if(o==='*')return x*y;if(y===0)return NaN;return x/y}
      for(const p of perms){
        for(const o1 of ops)for(const o2 of ops)for(const o3 of ops){
          for(const shape of shapes){
            const r = shape(p[0],p[1],p[2],p[3],o1,o2,o3);
            if(Math.abs(r-tgt)<0.0001) return true;
          }
        }
      }
      return false;
    }
    function newRound(){
      // pick 4 nums + target where solvable. Cap attempts for safety.
      const targets = [24,12,18,20,30,36,48,15];
      for(let attempt=0;attempt<60;attempt++){
        const v = [rand(1,9),rand(1,9),rand(1,9),rand(1,9)];
        const t = targets[rand(0,targets.length-1)];
        if(isSolvable(v,t)){
          nums = v.map((vv,i)=>({val:vv,id:i,used:false}));
          target = t;
          break;
        }
      }
      // fallback (should be rare): force a simple addable round
      if(!nums.length || !nums.some) {
        const a=rand(2,8),b=rand(2,8);
        nums=[{val:a,id:0,used:false},{val:b,id:1,used:false},{val:1,id:2,used:false},{val:1,id:3,used:false}];
        target = a*b+2;
      }
      expr=''; lastTok=null; parens=0;
      render();
      $('#tnMsg',mount).textContent='Build an expression. Each number used exactly once.';
      $('#tnMsg',mount).className='gmsg';
    }
    function addNum(idx){
      if(nums[idx].used) return;
      if(lastTok==='num'||lastTok==='close') return;
      expr += nums[idx].val;
      nums[idx].used=true;
      lastTok='num';
      render();
    }
    function addOp(op){
      if(!(lastTok==='num'||lastTok==='close')) return;
      expr += ' '+op+' ';
      lastTok='op';
      render();
    }
    function addParen(p){
      if(p==='('){
        if(lastTok==='num'||lastTok==='close') return;
        expr += '(';
        parens++;
        lastTok='open';
      } else {
        if(parens<=0) return;
        if(!(lastTok==='num'||lastTok==='close')) return;
        expr += ')';
        parens--;
        lastTok='close';
      }
      render();
    }
    function undo(){
      // remove last meaningful token (digit, paren, or " op ")
      const m = expr.match(/(\(|\)| [+\-−×÷] |\d)$/);
      if(!m) return;
      const tok = m[0];
      expr = expr.slice(0, -tok.length);
      if(/\d/.test(tok)){
        const v = parseInt(tok);
        const back = nums.findIndex(n=>n.val===v && n.used);
        if(back>=0) nums[back].used=false;
      } else if(tok==='('){parens--}
      else if(tok===')'){parens++}
      const tail = expr.trim().slice(-1);
      if(tail==='') lastTok=null;
      else if(/\d/.test(tail)) lastTok='num';
      else if(tail===')') lastTok='close';
      else if(tail==='(') lastTok='open';
      else lastTok='op';
      render();
    }
    function check(){
      if(parens>0){msg('Close all parentheses first.','lose');return}
      if(!nums.every(n=>n.used)){msg('Use every number exactly once.','lose');return}
      try{
        // Convert ALL operator unicode to JS ops
        const js = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
        const r = Function('"use strict";return ('+js+')')();
        if(typeof r !== 'number' || !isFinite(r)){msg('Expression evaluated to ∞ or NaN.','lose');return}
        if(Math.abs(r-target)<0.001){
          solved++;
          Arcade.earn(5);
          msg(`✅ ${expr.trim()} = ${target}! +5 🪙`,'win');
          setTimeout(newRound,1400);
        } else {
          const rd = Number.isInteger(r) ? r : Math.round(r*100)/100;
          msg(`✗ ${expr.trim()} = ${rd} (target ${target}). Try again.`,'lose');
        }
      } catch(e){msg('Invalid expression — check your operators.','lose')}
    }
    function msg(t,c){const m=$('#tnMsg',mount);m.textContent=t;m.className='gmsg '+(c||'')}
    function render(){
      const e = $('#tnExpr',mount);
      e.innerHTML = expr.trim() ? expr.replace(/ /g,'&nbsp;') : '<span class="ph">Build expression here…</span>';
      const r = $('#tnNums',mount);
      r.innerHTML='';
      nums.forEach((n,i)=>{
        const b = ce('button','tn-num',n.val);
        b.disabled=n.used;
        b.onclick=()=>addNum(i);
        r.appendChild(b);
      });
      $('#tnSolved',mount).textContent=solved;
      $('#tnTarget',mount).textContent=target;
      $('#tnTarget2',mount).textContent=target;  // sync big magenta display
    }
    mount.innerHTML = `
      <div class="hud">
        <span class="stat"><b>SOLVED</b><span id="tnSolved">0</span></span>
        <span class="stat"><b>TARGET</b><span id="tnTarget" style="color:var(--mag)">24</span></span>
      </div>
      <div class="tn-target"><div class="lbl">REACH</div><div class="v" id="tnTarget2">24</div></div>
      <div class="tn-expr" id="tnExpr"><span class="ph">Build expression here…</span></div>
      <div class="tn-row" id="tnNums"></div>
      <div class="tn-row">
        <button class="tn-op" onclick="window._tnOp('+')">+</button>
        <button class="tn-op" onclick="window._tnOp('−')">−</button>
        <button class="tn-op" onclick="window._tnOp('×')">×</button>
        <button class="tn-op" onclick="window._tnOp('÷')">÷</button>
        <button class="tn-op" onclick="window._tnPar('(')">(</button>
        <button class="tn-op" onclick="window._tnPar(')')">)</button>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" id="tnUndo">↶ Undo</button>
        <button class="btn btn-grn" id="tnCheck">✓ Submit</button>
        <button class="btn btn-mag" id="tnSkip">⟳ New Round</button>
      </div>
      <div class="gmsg" id="tnMsg">Build an expression. Each number used exactly once.</div>`;
    window._tnOp = addOp;
    window._tnPar = addParen;
    $('#tnUndo',mount).onclick=undo;
    $('#tnCheck',mount).onclick=check;
    $('#tnSkip',mount).onclick=newRound;
    newRound();
    return {cleanup(){delete window._tnOp;delete window._tnPar}};
  }
};

/* ═════════════════════════════════════════
   GAME 4 — CLIMB THE GRID
   Vertical platformer. Solve a problem to leap up to the
   next platform. Wrong answer = fall back two levels!
   ═════════════════════════════════════════ */
Games.climb = {
  name:'CLIMB THE GRID', icon:'🧗', tag:'PLATFORMER',
  unit:'Mixed Operations · Fluency Under Pressure', desc:'Solve to climb. Wrong answers send you tumbling down. Reach the top!',
  init(mount){
    const LEVELS = 6; // 0..5; goal = 5
    let level = 0;
    let cur = null;
    let timer = 8;
    let timerId, falling=false, gameOver=false, won=false;
    function genProblem(L){
      // Difficulty scales with L
      const ops = ['+','−','×','÷','int','solve'];
      const types = L<=1 ? ['+','−','×'] : L<=3 ? ['+','−','×','÷','int'] : ops;
      const t = types[rand(0,types.length-1)];
      let q,a;
      if(t==='+'){const x=rand(20+L*15,80+L*20),y=rand(15,40+L*10);q=`${x} + ${y}`;a=x+y}
      else if(t==='−'){const x=rand(40+L*20,120+L*30),y=rand(10,40+L*5);q=`${x} − ${y}`;a=x-y}
      else if(t==='×'){const x=rand(2+L,8+L),y=rand(3+L,9+L);q=`${x} × ${y}`;a=x*y}
      else if(t==='÷'){const y=rand(2,9),x=y*rand(2,9+L);q=`${x} ÷ ${y}`;a=x/y}
      else if(t==='int'){const x=rand(-15,-1),y=rand(1,12);q=`${x} + ${y}`;a=x+y}
      else { // solve
        const m=rand(2,5+L), b=rand(1,8+L), x=rand(2,7+L);
        const c=m*x+b;q=`Solve: ${m}x + ${b} = ${c}`;a=x;
      }
      const opts = new Set([a]);
      while(opts.size<4){
        const off = rand(-9,9);
        if(off!==0) opts.add(a+off);
      }
      return {q,a,opts:shuffle([...opts])};
    }
    function nextProblem(){
      if(gameOver) return;
      cur = genProblem(level);
      timer = Math.max(8 - Math.floor(level/2), 4);
      const probEl = $('#clProb',mount);
      probEl.innerHTML = `
        <div class="q">${cur.q} = ?</div>
        <div class="timer"><div style="width:100%"></div></div>
        <div class="cl-choices" id="clChoices"></div>`;
      const ch = $('#clChoices',mount);
      cur.opts.forEach(opt=>{
        const b = ce('button','choice-btn',String(opt));
        b.onclick=()=>answer(opt,b);
        ch.appendChild(b);
      });
      const bar = probEl.querySelector('.timer > div');
      requestAnimationFrame(()=>{bar.style.transition=`width ${timer}s linear`;bar.style.width='0%'});
      clearTimeout(timerId);
      timerId = setTimeout(()=>{
        if(!gameOver) {
          msg(`⏰ Out of time! Tumbled down.`,'lose');
          fall();
        }
      }, timer*1000);
    }
    function answer(opt, btnEl){
      clearTimeout(timerId);
      const correct = opt === cur.a;
      btnEl.classList.add(correct?'correct':'wrong');
      mount.querySelectorAll('.cl-choices button').forEach(b=>b.disabled=true);
      setTimeout(()=>{
        if(correct) climb();
        else fall();
      }, 450);
    }
    function climb(){
      level++;
      $('#clLvl',mount).textContent=level;
      msg(`✓ Correct! Climbed to platform ${level}.`,'win');
      placePlayer();
      // Platforms are appended bottom-up: index i = height i. Mark all <= level as cleared.
      mount.querySelectorAll('.cl-platform').forEach((p,i)=>{
        if(i>0 && i<=level) p.classList.add('cleared');
      });
      if(level >= LEVELS-1){winGame()}
      else setTimeout(nextProblem, 700);
    }
    function fall(){
      level = Math.max(0, level-2);
      $('#clLvl',mount).textContent=level;
      const p = $('#clPlayer',mount);
      p.classList.add('fall');
      placePlayer();
      // un-clear platforms above current level
      mount.querySelectorAll('.cl-platform').forEach((pe,i)=>{
        if(i>level && !pe.classList.contains('top')) pe.classList.remove('cleared');
      });
      setTimeout(()=>{p.classList.remove('fall');nextProblem()}, 900);
    }
    function placePlayer(){
      const p = $('#clPlayer',mount);
      // platform i (i from top) is at bottom = (LEVELS-1-i)*spacing
      // We'll position by level (0=bottom, LEVELS-1=top)
      const stage = $('#clStage',mount);
      const h = stage.clientHeight;
      const spacing = h / LEVELS;
      const bottom = level*spacing + 14;
      p.style.bottom = bottom+'px';
    }
    function winGame(){
      won=true;gameOver=true;clearTimeout(timerId);
      const reward = 25;
      Arcade.earn(reward);
      msg(`🏆 You reached the top! +${reward} 🪙`,'win');
      $('#clProb',mount).innerHTML = '<button class="btn btn-cyan" id="clRestart">🔄 Play Again</button>';
      $('#clRestart',mount).onclick = ()=>reset();
    }
    function msg(t,c){const m=$('#clMsg',mount);m.textContent=t;m.className='gmsg '+(c||'')}
    function reset(){level=0;gameOver=false;won=false;$('#clLvl',mount).textContent=0;mount.querySelectorAll('.cl-platform').forEach((p,i)=>{if(!p.classList.contains('top'))p.classList.remove('cleared')});placePlayer();nextProblem();msg('Solve to leap upward. Goal: reach the gold platform.','')}
    // Build stage
    mount.innerHTML = `
      <div class="hud">
        <span class="stat"><b>PLATFORM</b><span id="clLvl">0</span>/${LEVELS-1}</span>
      </div>
      <div class="cl-stage" id="clStage"></div>
      <div class="cl-prob" id="clProb"></div>
      <div class="gmsg" id="clMsg">Solve to leap upward. Goal: reach the gold platform.</div>`;
    const stage = $('#clStage',mount);
    // Render platforms
    setTimeout(()=>{
      const h = stage.clientHeight;
      const spacing = h / LEVELS;
      for(let i=0;i<LEVELS;i++){
        const p = ce('div','cl-platform','');
        p.style.bottom = (i*spacing + 8)+'px';
        if(i===LEVELS-1){p.classList.add('top');p.innerHTML='<span class="star">⭐ TOP</span>'}
        stage.appendChild(p);
      }
      const player = ce('div','cl-player','🧗');
      player.id = 'clPlayer';
      stage.appendChild(player);
      placePlayer();
      nextProblem();
    },50);
    // observe level change
    const _origClimb = climb;
    return {cleanup(){clearTimeout(timerId);gameOver=true}};
  }
};

/* ═════════════════════════════════════════
   GAME 5 — RETRO BOSS BATTLES
   Three-phase boss fight. Each phase locks a different math
   skill. Solve in time to attack; miss/timeout = take damage.
   ═════════════════════════════════════════ */
Games.boss = {
  name:'RETRO BOSS BATTLES', icon:'👹', tag:'BOSS RUSH',
  unit:'Mixed Concept Mastery · 3 Phases', desc:'Three bosses, three skill domains. Solve fast to deal damage. Survive all three for the loot.',
  init(mount){
    const PHASES = [
      {name:'ARITHMETIC OGRE', sprite:'👹', hp:30, time:9,
       gen:()=>{const t=['+','−','×'][rand(0,2)];
        if(t==='+'){const a=rand(20,80),b=rand(10,60);return{q:`${a} + ${b}`,a:a+b}}
        if(t==='−'){const a=rand(40,120),b=rand(10,40);return{q:`${a} − ${b}`,a:a-b}}
        const a=rand(3,9),b=rand(4,12);return{q:`${a} × ${b}`,a:a*b};
       }},
      {name:'ALGEBRA WRAITH', sprite:'🧙‍♂️', hp:35, time:8,
       gen:()=>{const m=rand(2,6),b=rand(-6,8),x=rand(2,9),c=m*x+b;
        return{q:`${m}x ${b>=0?'+ '+b:'− '+(-b)} = ${c} ; x = ?`,a:x}}},
      {name:'GEOMETRY PHANTOM', sprite:'👻', hp:40, time:7,
       gen:()=>{const t=['rect','tri','pyth','slope'][rand(0,3)];
        if(t==='rect'){const l=rand(3,12),w=rand(3,9);return{q:`Rectangle area: ${l} × ${w}`,a:l*w}}
        if(t==='tri'){const b=rand(2,7)*2,h=rand(3,10);return{q:`Triangle area: ½ · ${b} · ${h}`,a:b*h/2}}
        if(t==='pyth'){const a=rand(3,8),b=rand(3,8);return{q:`a² + b² where a=${a}, b=${b}`,a:a*a+b*b}}
        // slope: force integer answer by picking dx that divides dy; avoid m=0
        let m; do{m=rand(-3,4)}while(m===0);
        const dx=rand(1,4), dy=m*dx;
        const x1=rand(0,3),y1=rand(0,4),x2=x1+dx,y2=y1+dy;
        return{q:`Slope from (${x1},${y1}) to (${x2},${y2})`,a:m};
       }}
    ];
    let phaseI = 0;
    let bossHp, playerHp = 100, cur, timerId, gameOver=false;
    function startPhase(){
      const p = PHASES[phaseI];
      bossHp = p.hp;
      $('#bsName',mount).textContent = p.name;
      $('#bsSprite',mount).textContent = p.sprite;
      $('#bsPhase',mount).textContent = `${phaseI+1}/${PHASES.length}`;
      msg(`⚔ ${p.name} appears!`,'');
      updateBars();
      next();
    }
    function next(){
      if(gameOver) return;
      const p = PHASES[phaseI];
      cur = p.gen();
      const probEl = $('#bsProb',mount);
      const opts = new Set([cur.a]);
      while(opts.size<4){
        const off = rand(-7,7);
        if(off!==0) opts.add(cur.a+off);
      }
      probEl.innerHTML = `
        <div class="q">${cur.q}</div>
        <div class="timer"><div style="width:100%"></div></div>
        <div class="bs-choices" id="bsChoices"></div>`;
      shuffle([...opts]).forEach(o=>{
        const b = ce('button','choice-btn',String(o));
        b.onclick=()=>answer(o,b);
        $('#bsChoices',mount).appendChild(b);
      });
      const bar = probEl.querySelector('.timer > div');
      requestAnimationFrame(()=>{bar.style.transition=`width ${p.time}s linear`;bar.style.width='0%'});
      clearTimeout(timerId);
      timerId = setTimeout(()=>{takeDamage(15,'⏰ Too slow!')}, p.time*1000);
    }
    function answer(opt, btnEl){
      clearTimeout(timerId);
      mount.querySelectorAll('.bs-choices button').forEach(b=>b.disabled=true);
      const correct = Math.abs(opt - cur.a) < 0.0001;
      btnEl.classList.add(correct?'correct':'wrong');
      if(correct){dealDamage(rand(8,14),'⚔ Hit!')}
      else takeDamage(12,'✗ Wrong! Boss strikes back!');
    }
    function dealDamage(dmg,t){
      bossHp = Math.max(0, bossHp - dmg);
      const sp = $('#bsSprite',mount);sp.classList.add('hit');setTimeout(()=>sp.classList.remove('hit'),350);
      msg(t+` -${dmg} boss HP`,'win');
      updateBars();
      if(bossHp<=0){nextPhase();return}
      setTimeout(next, 800);
    }
    function takeDamage(dmg,t){
      playerHp = Math.max(0, playerHp - dmg);
      flash();
      msg(t+` You took ${dmg} damage`,'lose');
      updateBars();
      if(playerHp<=0){lose();return}
      setTimeout(next, 900);
    }
    function flash(){
      const f = $('#bsFlash',mount);
      f.classList.add('show');
      setTimeout(()=>f.classList.remove('show'),420);
    }
    function nextPhase(){
      phaseI++;
      if(phaseI >= PHASES.length){win();return}
      msg(`✅ Boss down! Phase ${phaseI+1} incoming...`,'win');
      setTimeout(startPhase, 1300);
    }
    function win(){
      gameOver=true;clearTimeout(timerId);
      const reward = 50;
      Arcade.earn(reward);
      msg(`🏆 ALL BOSSES DEFEATED! +${reward} 🪙`,'win');
      $('#bsProb',mount).innerHTML='<button class="btn btn-cyan" id="bsRestart">🔄 Replay</button>';
      $('#bsRestart',mount).onclick=reset;
    }
    function lose(){
      gameOver=true;clearTimeout(timerId);
      const reward = phaseI*8;
      if(reward>0) Arcade.earn(reward);
      msg(`💀 You fell at phase ${phaseI+1}. ${reward>0?'+'+reward+' 🪙 partial reward.':''}`,'lose');
      $('#bsProb',mount).innerHTML='<button class="btn btn-cyan" id="bsRestart">🔄 Try Again</button>';
      $('#bsRestart',mount).onclick=reset;
    }
    function updateBars(){
      const p = PHASES[phaseI];
      const bp = bossHp/p.hp*100;
      const pp = playerHp/100*100;
      $('#bsBossBar',mount).firstElementChild.style.width=Math.max(0,bp)+'%';
      $('#bsPlayerBar',mount).firstElementChild.style.width=Math.max(0,pp)+'%';
      $('#bsBossHp',mount).textContent=Math.max(0,bossHp);
      $('#bsPlayerHp',mount).textContent=Math.max(0,playerHp);
      $('#bsPlayerBar',mount).classList.toggle('danger', playerHp<=30);
    }
    function msg(t,c){const m=$('#bsMsg',mount);m.textContent=t;m.className='gmsg '+(c||'')}
    function reset(){phaseI=0;playerHp=100;gameOver=false;startPhase()}
    mount.innerHTML = `
      <div class="hud">
        <span class="stat"><b>PHASE</b><span id="bsPhase">1/3</span></span>
        <span class="stat"><b>BOSS HP</b><span id="bsBossHp" style="color:var(--mag)">0</span></span>
        <span class="stat"><b>YOUR HP</b><span id="bsPlayerHp" style="color:var(--grn)">100</span></span>
      </div>
      <div class="bs-arena">
        <div class="bs-flash" id="bsFlash"></div>
        <div class="bs-name" id="bsName"></div>
        <div class="bs-sprite" id="bsSprite"></div>
        <div class="bs-bars">
          <div class="row"><span class="lbl">BOSS</span><div class="hbar boss" id="bsBossBar"><div style="width:100%"></div></div></div>
          <div class="row"><span class="lbl">YOU</span><div class="hbar" id="bsPlayerBar"><div style="width:100%"></div></div></div>
        </div>
        <div class="bs-prob" id="bsProb"></div>
      </div>
      <div class="gmsg" id="bsMsg">Three bosses ahead. Answer fast — silence is damage.</div>`;
    startPhase();
    return {cleanup(){clearTimeout(timerId);gameOver=true}};
  }
};

// ═════════════════════════════════════════
Arcade.init();
Arcade.fromHash();
window.addEventListener('hashchange', ()=>Arcade.fromHash());
</script>
